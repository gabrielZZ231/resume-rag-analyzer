services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: resume-rag-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=resume_rag
      - POSTGRES_USER=${DB_USERNAME:-quarkus}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-quarkus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-quarkus} -d resume_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resume-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-rag-backend
    ports:
      - "8080:8080"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/resume_rag
      - QUARKUS_DATASOURCE_USERNAME=${DB_USERNAME:-quarkus}
      - QUARKUS_DATASOURCE_PASSWORD=${DB_PASSWORD:-quarkus}
      - AI_API_KEY=${AI_API_KEY:-none}
      - AI_MODEL_NAME=${AI_MODEL_NAME:-gpt-4o}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.openai.com/v1}
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-none}
      - GEMINI_MODEL_NAME=${GEMINI_MODEL_NAME:-gemini-1.5-flash}
      - AI_TIMEOUT=${AI_TIMEOUT:-60s}
      - MAIL_HOST=${MAIL_HOST:-mailpit}
      - MAIL_PORT=${MAIL_PORT:-1025}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_FROM=${MAIL_FROM:-noreply@resume-intelligence.com}
      - MAIL_STARTTLS=${MAIL_STARTTLS:-OPTIONAL}
      - MAIL_MOCK=${MAIL_MOCK:-false}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - APP_BASE_URL=http://localhost:8080
      - APP_FRONTEND_URL=http://localhost:8081
      - APP_JWT_ISSUER=${APP_JWT_ISSUER:-https://acme.org/}
      - APP_REPORT_TIMEZONE=${APP_REPORT_TIMEZONE:-America/Sao_Paulo}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:4200,http://localhost:80,http://localhost:8081}
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - resume-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume-rag-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - resume-network

  mailpit:
    image: axllent/mailpit
    container_name: resume-rag-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - resume-network

volumes:
  postgres_data:

networks:
  resume-network:
    driver: bridge
