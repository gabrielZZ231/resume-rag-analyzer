# Escolha do Provedor de IA (openai ou google-ai-gemini)
quarkus.langchain4j.chat-model.provider=${AI_PROVIDER:openai}

# Configurações para OpenAI, Groq, Ollama, etc.
quarkus.langchain4j.openai.api-key=${AI_API_KEY:none}
quarkus.langchain4j.openai.base-url=${AI_BASE_URL:https://api.openai.com/v1}
quarkus.langchain4j.openai.chat-model.model-name=${AI_MODEL_NAME:gpt-4o}

# Configurações para Google Gemini
quarkus.langchain4j.google-ai-gemini.api-key=${GEMINI_API_KEY:none}
quarkus.langchain4j.google-ai-gemini.chat-model.model-name=${GEMINI_MODEL_NAME:gemini-1.5-flash}

quarkus.langchain4j.openai.timeout=${AI_TIMEOUT:60s}
quarkus.langchain4j.openai.log-requests=true
quarkus.langchain4j.openai.log-responses=true

quarkus.langchain4j.pgvector.table=resume_embeddings
quarkus.langchain4j.pgvector.dimension=384

quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.database.generation=update

mp.jwt.verify.publickey.location=jwt/publicKey.pem
app.jwt.issuer=${APP_JWT_ISSUER:https://acme.org/}
mp.jwt.verify.issuer=${app.jwt.issuer}
smallrye.jwt.sign.key.location=jwt/privateKeyPkcs8.pem

quarkus.http.auth.permission.public.paths=/auth/login,/auth/register,/auth/verify
quarkus.http.auth.permission.public.policy=permit

quarkus.http.auth.permission.authenticated.paths=/analyze,/analyze/*,/dashboard/*,/notifications/*,/auth/session-status
quarkus.http.auth.permission.authenticated.policy=authenticated

quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost,http://localhost:4200,http://localhost:80,http://localhost:8081}
quarkus.http.cors.methods=GET,PUT,POST,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with
quarkus.http.cors.access-control-allow-credentials=true

app.analysis.async.enabled=true
app.report.timezone=${APP_REPORT_TIMEZONE:America/Sao_Paulo}
quarkus.mailer.host=${MAIL_HOST:mailpit}
quarkus.mailer.port=${MAIL_PORT:1025}
quarkus.mailer.username=${MAIL_USERNAME:}
quarkus.mailer.password=${MAIL_PASSWORD:}
quarkus.mailer.from=${MAIL_FROM:noreply@resume-intelligence.com}
quarkus.mailer.start-tls=${MAIL_STARTTLS:OPTIONAL}
quarkus.mailer.mock=${MAIL_MOCK:false}

app.admin.email=${ADMIN_EMAIL:admin@admin.com}
%prod.app.base-url=${APP_BASE_URL:http://localhost:8080}
%prod.app.frontend.url=${APP_FRONTEND_URL:http://localhost:8081}

%prod.quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/resume_rag}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:quarkus}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:quarkus}

quarkus.http.limits.max-body-size=20M
quarkus.http.limits.max-form-attribute-size=512K
