<div class="bg-[#f8fafc] min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
  <div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-blue-50/50 blur-[120px]"></div>
    <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-indigo-50/50 blur-[120px]"></div>
  </div>

  <div class="max-w-md w-full glass p-8 rounded-[2rem] shadow-2xl shadow-blue-900/5 bg-white/70">
    <div class="text-center mb-8">
      <div class="bg-gradient-to-br from-indigo-600 to-purple-700 p-4 rounded-2xl shadow-lg inline-block mb-4">
        <i class="fas fa-user-plus text-white text-2xl"></i>
      </div>
      <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Solicitar Acesso</h1>
      <p class="text-slate-500 text-sm font-medium mt-1">Sua conta precisará de aprovação manual</p>
    </div>

    <div *ngIf="success" class="text-center space-y-6 py-10">
      <div class="h-20 w-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto text-3xl">
        <i class="fas fa-paper-plane"></i>
      </div>
      <div class="space-y-2">
        <h2 class="text-xl font-bold text-slate-800">Solicitação Enviada!</h2>
        <p class="text-sm text-slate-500 font-medium">Enviamos um link de confirmação para seu email. Verifique sua caixa de entrada.</p>
      </div>
      <a routerLink="/login" class="inline-block text-blue-600 font-bold hover:underline">Voltar para o Login</a>
    </div>

    <div *ngIf="error" class="mb-6 p-4 bg-rose-50 border border-rose-100 rounded-xl text-rose-700 text-xs font-bold flex items-center gap-2">
      <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>

    <form *ngIf="!success" (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="space-y-2">
        <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest ml-1">Email Profissional</label>
        <input type="email" [(ngModel)]="email" name="email" required
          class="w-full p-4 bg-white/50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all text-sm" placeholder="exemplo@empresa.com" />
      </div>
      <div class="space-y-2">
        <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest ml-1">Senha de Acesso</label>
        <input type="password" [(ngModel)]="password" name="password" required
          class="w-full p-4 bg-white/50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all text-sm" placeholder="Mínimo 8 caracteres" />
      </div>

      <button type="submit" class="w-full bg-slate-900 hover:bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-xl transition-all active:scale-[0.97]">
        Criar Conta
      </button>
    </form>

    <div *ngIf="!success" class="mt-8 pt-6 border-t border-slate-100 text-center">
      <p class="text-sm text-slate-500 font-medium">Já tem uma conta?</p>
      <a routerLink="/login" class="text-blue-600 font-bold text-sm hover:underline mt-1 inline-block">Fazer Login</a>
    </div>
  </div>
</div>
