<div class="bg-[#f8fafc] min-h-screen flex items-center justify-center p-6 text-slate-900 relative overflow-hidden">
  <div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-blue-50/50 blur-[120px]"></div>
    <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-indigo-50/50 blur-[120px]"></div>
  </div>

  <div class="max-w-md w-full glass p-10 rounded-[2.5rem] shadow-2xl shadow-blue-900/5 text-center space-y-8 bg-white/70">
    <div class="relative inline-block">
      <div class="absolute inset-0 bg-amber-500 blur-lg opacity-20 animate-pulse"></div>
      <div class="relative bg-gradient-to-br from-amber-400 to-orange-600 p-6 rounded-3xl shadow-lg">
        <i class="fas fa-clock text-white text-4xl"></i>
      </div>
    </div>

    <div class="space-y-3">
      <h1 class="text-2xl font-black text-slate-800 tracking-tight">Acesso Pendente</h1>
      <p class="text-slate-500 font-medium leading-relaxed">
        Sua conta foi verificada com sucesso, mas ainda precisa ser aprovada por um administrador.
      </p>
    </div>

    <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100/50 text-xs font-bold text-blue-600 uppercase tracking-widest">
      Verificando status em tempo real...
    </div>

    <div class="pt-4 flex flex-col gap-4">
      <button (click)="logout()" class="w-full py-4 bg-slate-900 text-white font-bold rounded-2xl hover:bg-slate-800 transition-all shadow-lg">
        <i class="fas fa-sign-out-alt mr-2"></i> Sair do Sistema
      </button>
      <button (click)="reload()" class="text-xs font-black text-slate-400 hover:text-blue-600 uppercase tracking-widest transition-colors">
        Já fui aprovado? Clique aqui
      </button>
    </div>
  </div>
</div>
