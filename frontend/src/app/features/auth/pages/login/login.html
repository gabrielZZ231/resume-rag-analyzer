<div class="bg-[#f8fafc] min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
  <div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-blue-50/50 blur-[120px]"></div>
    <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-indigo-50/50 blur-[120px]"></div>
  </div>

  <div class="max-w-md w-full glass p-8 rounded-[2rem] shadow-2xl shadow-blue-900/5 bg-white/70">
    <div class="text-center mb-8">
      <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-4 rounded-2xl shadow-lg inline-block mb-4">
        <i class="fas fa-brain text-white text-2xl"></i>
      </div>
      <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Bem-vindo de volta</h1>
      <p class="text-slate-500 text-sm font-medium mt-1">Entre na sua conta para continuar</p>
    </div>

    <div *ngIf="verified" class="mb-6 p-4 bg-emerald-50 border border-emerald-100 rounded-xl text-emerald-700 text-xs font-bold flex items-center gap-2">
      <i class="fas fa-check-circle"></i> Email verificado! Aguarde a aprovação do administrador.
    </div>

    <div *ngIf="rejected" class="mb-6 p-4 bg-rose-50 border border-rose-100 rounded-xl text-rose-700 text-xs font-bold flex items-center gap-2">
      <i class="fas fa-exclamation-circle"></i> Sua solicitação foi recusada. Se desejar acesso novamente, faça um novo cadastro.
    </div>

    <div *ngIf="error" class="mb-6 p-4 bg-rose-50 border border-rose-100 rounded-xl text-rose-700 text-xs font-bold flex items-center gap-2">
      <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="space-y-2">
        <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest ml-1">Email</label>
        <input type="email" [(ngModel)]="username" name="username" required
          class="w-full p-4 bg-white/50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all text-sm" />
      </div>
      <div class="space-y-2">
        <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest ml-1">Senha</label>
        <input type="password" [(ngModel)]="password" name="password" required
          class="w-full p-4 bg-white/50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all text-sm" />
      </div>

      <button type="submit" class="w-full bg-slate-900 hover:bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-xl transition-all active:scale-[0.97]">
        Entrar
      </button>
    </form>

    <div class="mt-8 pt-6 border-t border-slate-100 text-center">
      <p class="text-sm text-slate-500 font-medium">Não tem uma conta?</p>
      <a routerLink="/register" class="text-blue-600 font-bold text-sm hover:underline mt-1 inline-block">Solicitar Acesso</a>
    </div>
  </div>
</div>
