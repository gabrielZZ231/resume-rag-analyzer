<header
  class="flex items-center justify-between mb-12 glass p-6 rounded-3xl shadow-xl shadow-blue-900/5 relative z-50"
>
  <div class="flex items-center gap-5">
    <div class="relative cursor-pointer" (click)="goToHome()">
      <div class="absolute inset-0 bg-blue-600 blur-lg opacity-20"></div>
      <div
        class="relative bg-gradient-to-br from-blue-600 to-indigo-700 p-4 rounded-2xl shadow-lg"
      >
        <i class="fas fa-brain text-white text-2xl"></i>
      </div>
    </div>
    <div class="cursor-pointer" (click)="goToHome()">
      <h1
        class="text-2xl font-extrabold text-slate-800 tracking-tight leading-none"
      >
        Resume Intelligence
      </h1>
    </div>
  </div>

  <div class="flex items-center gap-6">
    <div *ngIf="isAdmin()" class="relative group">
      <button
        class="relative p-3 bg-slate-100 hover:bg-blue-100 text-slate-600 rounded-xl transition-all"
        (click)="toggleNotifDropdown()"
      >
        <i class="fas fa-bell"></i>
        <span
          *ngIf="unreadCount > 0"
          class="absolute -top-1 -right-1 h-5 w-5 bg-rose-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center border-2 border-white"
        >
          {{ unreadCount }}
        </span>
      </button>

      <div
        *ngIf="showNotifDropdown"
        class="absolute right-0 mt-3 w-80 bg-white rounded-2xl shadow-2xl border border-slate-100 overflow-hidden z-[60]"
      >
        <div
          class="p-4 border-b border-slate-50 flex justify-between items-center bg-slate-50/50"
        >
          <span
            class="text-xs font-black text-slate-400 uppercase tracking-widest"
            >Notificações</span
          >
          <button
            class="text-[10px] font-bold text-blue-600"
            (click)="readAllNotifications()"
          >
            Limpar todas
          </button>
        </div>
        <div class="max-h-64 overflow-y-auto">
          <div
            *ngIf="notifications.length === 0"
            class="p-8 text-center text-slate-400 text-xs italic"
          >
            Sem novas solicitações.
          </div>
          <div
            *ngFor="let n of notifications"
            class="p-4 border-b border-slate-50 hover:bg-blue-50/50 transition-colors cursor-pointer"
            [ngClass]="{ 'opacity-50': n.isRead }"
            (click)="markReadAndGo(n.id, n.referenceId)"
          >
            <p class="text-xs font-bold text-slate-700">{{ n.message }}</p>
            <p class="text-[9px] text-slate-400 mt-1 uppercase font-black">
              {{ n.createdAt | date: "short" }}
            </p>
          </div>
        </div>
      </div>
    </div>

    <div class="relative group">
      <button
        class="flex items-center gap-3 p-2 pr-4 bg-slate-900 text-white rounded-2xl hover:bg-blue-600 transition-all"
        (click)="toggleProfileDropdown()"
      >
        <div
          class="h-10 w-10 bg-white/20 rounded-xl flex items-center justify-center"
        >
          <i class="fas fa-user-circle"></i>
        </div>
        <div class="text-left hidden md:block">
          <p
            class="text-[10px] font-black uppercase tracking-widest opacity-60 leading-none"
          >
            Perfil
          </p>
          <p class="text-sm font-bold leading-none mt-1">
            {{ currentUser()?.email || "Minha Conta" }}
          </p>
        </div>
        <i class="fas fa-chevron-down text-[10px] ml-2 opacity-60"></i>
      </button>

      <div
        *ngIf="showProfileDropdown"
        class="absolute right-0 mt-3 w-56 bg-white rounded-2xl shadow-2xl border border-slate-100 overflow-hidden z-[60]"
      >
        <button
          (click)="goToHome()"
          class="w-full text-left flex items-center gap-3 p-4 text-sm font-bold text-slate-600 hover:bg-slate-50 transition-colors"
        >
          <i class="fas fa-plus-circle text-emerald-500"></i> Nova Análise
        </button>
        <button
          (click)="showProfileDropdown = false; router.navigate(['/dashboard'])"
          class="w-full text-left flex items-center gap-3 p-4 text-sm font-bold text-slate-600 hover:bg-slate-50 transition-colors border-t border-slate-50"
        >
          <i class="fas fa-chart-pie text-blue-500"></i> Painel de Talentos
        </button>
        <button
          *ngIf="isAdmin()"
          (click)="showProfileDropdown = false; router.navigate(['/admin'])"
          class="w-full text-left flex items-center gap-3 p-4 text-sm font-bold text-slate-600 hover:bg-slate-50 transition-colors border-t border-slate-50"
        >
          <i class="fas fa-user-shield text-indigo-500"></i> Gerenciar Acessos
        </button>
        <button
          (click)="logout()"
          class="w-full text-left flex items-center gap-3 p-4 text-sm font-bold text-rose-600 hover:bg-rose-50 transition-colors border-t border-slate-50"
        >
          <i class="fas fa-sign-out-alt"></i> Sair do Sistema
        </button>
      </div>
    </div>
  </div>
</header>
