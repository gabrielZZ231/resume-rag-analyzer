name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Generate JWT Keys
        run: |
          mkdir -p backend/src/main/resources/jwt
          openssl genrsa -out backend/src/main/resources/jwt/privateKey.pem 2048
          openssl rsa -in backend/src/main/resources/jwt/privateKey.pem -pubout -outform PEM -out backend/src/main/resources/jwt/publicKey.pem
          openssl pkcs8 -topk8 -inform PEM -outform PEM -in backend/src/main/resources/jwt/privateKey.pem -out backend/src/main/resources/jwt/privateKeyPkcs8.pem -nocrypt
      - name: Run Backend Tests
        run: cd backend && mvn test

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm install
      - name: Run Frontend Lint
        run: cd frontend && npm run lint
      - name: Run Frontend Unit Tests
        run: cd frontend && npm run test -- --watch=false --browsers=ChromeHeadless

  docker-build:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Compose
        run: docker compose build
